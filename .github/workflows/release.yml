name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  checks: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git fetch --tags
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag '$TAG' does not exist in this repository."
              exit 1
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        run: git checkout "${{ steps.resolve_tag.outputs.tag }}"

      - name: Validate tag against protected release policy
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRED_CI_CHECK: test-build
        run: |
          TAG_SHA="$(git rev-parse HEAD)"
          git fetch origin main --depth=1

          # Guardrail: releases can only be created from commits that are already on main.
          if ! git merge-base --is-ancestor "$TAG_SHA" "origin/main"; then
            echo "Tag commit is not reachable from origin/main."
            exit 1
          fi

          CI_CONCLUSION="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/${TAG_SHA}/check-runs" \
            --jq ".check_runs[] | select(.name == \"${REQUIRED_CI_CHECK}\") | .conclusion" \
            | head -n 1)"

          if [ "$CI_CONCLUSION" != "success" ]; then
            echo "Required CI check '${REQUIRED_CI_CHECK}' is not successful for commit ${TAG_SHA}."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build release artifact
        run: |
          mkdir -p dist
          tar -czf "dist/auto-docs-notion-mcp-${{ steps.resolve_tag.outputs.tag }}.tar.gz" \
            build \
            package.json \
            package-lock.json \
            README.md \
            LICENSE

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          ARTIFACT="dist/auto-docs-notion-mcp-${TAG}.tar.gz"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARTIFACT" --clobber
          else
            gh release create "$TAG" "$ARTIFACT" --generate-notes --title "$TAG"
          fi
