name: Live Notion Integration Tests

on:
  workflow_dispatch:
    inputs:
      live_notion_token:
        description: "Notion integration token for live test run"
        required: false
        default: ""
      live_notion_parent_page_id:
        description: "Notion parent page id for live test run"
        required: false
        default: ""

jobs:
  live-notion-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        shell: bash
        env:
          LIVE_SECRET_ONE: ${{ github.event.inputs.live_notion_token }}
          LIVE_SECRET_TWO: ${{ github.event.inputs.live_notion_parent_page_id }}
        run: |
          if [ -z "$LIVE_SECRET_ONE" ] || [ -z "$LIVE_SECRET_TWO" ]; then
            echo "Missing required live Notion inputs; skipping live Notion test run."
            exit 0
          fi

      - name: Run live Notion pipeline smoke test
        shell: bash
        env:
          LIVE_SECRET_ONE: ${{ github.event.inputs.live_notion_token }}
          LIVE_SECRET_TWO: ${{ github.event.inputs.live_notion_parent_page_id }}
          RUN_LIVE_NOTION_TESTS: "true"
        run: |
          export NOTION_TOKEN="$LIVE_SECRET_ONE"
          export NOTION_PARENT_PAGE_ID="$LIVE_SECRET_TWO"
          npm run test:live-notion
