name: Prompt Endpoint Connectivity Check

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Bifrost base URL (e.g. https://bifrost.giscop.com)"
        required: true
        type: string

jobs:
  connectivity-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve endpoint and run safe connectivity probe
        env:
          BIFROST_ENDPOINT: ${{ inputs.endpoint }}
          AI_API_KEY: ${{ vars['BIFROST_PROMPT_REPO_API_KEY'] || secrets['BIFROST_PROMPT_REPO_API_KEY'] || '' }}
        run: |
          set -euo pipefail

          # Normalize and validate endpoint input early.
          BIFROST_ENDPOINT="$(printf '%s' "${BIFROST_ENDPOINT:-}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "${BIFROST_ENDPOINT:-}" ]; then
            echo "Missing endpoint input. Provide 'endpoint' when manually triggering the workflow."
            exit 1
          fi

          if [[ ! "${BIFROST_ENDPOINT}" =~ ^https?:// ]]; then
            echo "Invalid endpoint '${BIFROST_ENDPOINT}'. Use a full URL starting with http:// or https://"
            exit 1
          fi

          if [[ "${BIFROST_ENDPOINT}" == http://localhost* ]] || [[ "${BIFROST_ENDPOINT}" == http://127.0.0.1* ]]; then
            echo "Endpoint '${BIFROST_ENDPOINT}' points to localhost. GitHub-hosted runners cannot reach your local machine."
            echo "Use a public/tunneled endpoint (for example your cloudflared hostname) or run on a self-hosted runner."
            exit 1
          fi

          TARGET="${BIFROST_ENDPOINT%/}/api/prompt-repo/prompts"
          echo "Probing endpoint: ${TARGET}"
          if [ -n "${AI_API_KEY:-}" ]; then
            echo "Auth header: enabled"
          else
            echo "Auth header: disabled"
          fi

          # Capture only safe diagnostics (no response body logging).
          set +e
          if [ -n "${AI_API_KEY:-}" ]; then
            METRICS=$(curl -sS -o /tmp/prompt_probe_body.json \
              -w "http_code=%{http_code}\nremote_ip=%{remote_ip}\ntime_connect=%{time_connect}\ntime_total=%{time_total}\nsize_download=%{size_download}\n" \
              --connect-timeout 10 --max-time 25 \
              -H "Authorization: Bearer ${AI_API_KEY}" \
              "$TARGET")
            CURL_EXIT=$?
          else
            METRICS=$(curl -sS -o /tmp/prompt_probe_body.json \
              -w "http_code=%{http_code}\nremote_ip=%{remote_ip}\ntime_connect=%{time_connect}\ntime_total=%{time_total}\nsize_download=%{size_download}\n" \
              --connect-timeout 10 --max-time 25 \
              "$TARGET")
            CURL_EXIT=$?
          fi
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "curl failed with exit code ${CURL_EXIT}. This usually indicates DNS, routing, TLS, or firewall/network reachability issues from the GitHub runner."
            echo "Checked endpoint: ${TARGET}"
            exit 1
          fi

          echo "$METRICS"
          HTTP_CODE=$(echo "$METRICS" | awk -F= '/^http_code=/{print $2}')
          BYTES=$(wc -c < /tmp/prompt_probe_body.json | tr -d ' ')
          echo "response_bytes=${BYTES}"

          if [[ "$HTTP_CODE" =~ ^2[0-9][0-9]$ ]]; then
            echo "Connectivity check passed."
          else
            echo "Connectivity check failed with HTTP ${HTTP_CODE}."
            exit 1
          fi
