name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prompt drift guard (dry run)
        env:
          BIFROST_ENDPOINT: ${{ secrets['BIFROST_PROMPT_REPO_ENDPOINT'] }}
          AI_API_KEY: ${{ secrets['BIFROST_PROMPT_REPO_API_KEY'] }}
        run: |
          if [ -z "$BIFROST_ENDPOINT" ]; then
            echo "Missing secret BIFROST_PROMPT_REPO_ENDPOINT for prompt drift guard."
            exit 1
          fi
          npm run prompts:sync:dry-run

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
