events {
  worker_connections 1024;
}

http {
  upstream bifrost {
    server bifrost-gateway:8080;
  }

  upstream auto_doc {
    server notion-auto-doc:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /ws {
      proxy_pass http://bifrost;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /api/ {
      proxy_pass http://bifrost;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_cookie_domain localhost bifrost.giscop.com;
      proxy_cookie_domain bifrost-gateway bifrost.giscop.com;
      proxy_cookie_flags ~ secure samesite=lax;

      proxy_read_timeout 120s;
    }

    location /mcp/ {
      proxy_pass http://auto_doc/;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
      proxy_read_timeout 3600s;
    }

    location /health {
      proxy_pass http://auto_doc/health;
      proxy_set_header Host $host;
    }

    location /info {
      proxy_pass http://auto_doc/info;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://bifrost;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_cookie_domain localhost bifrost.giscop.com;
      proxy_cookie_domain bifrost-gateway bifrost.giscop.com;
      proxy_cookie_flags ~ secure samesite=lax;

      proxy_read_timeout 120s;
      proxy_buffer_size 128k;
      proxy_buffers 4 256k;
    }
  }
}