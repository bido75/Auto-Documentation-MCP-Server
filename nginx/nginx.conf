worker_processes auto;

events { worker_connections 1024; }

http {
  upstream bifrost { server bifrost-gateway:8080; }
  upstream auto_doc { server notion-auto-doc:3000; }

  server {
    listen 80;
    server_name _;

    auth_basic "Auto-Doc MCP";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /bifrost/ {
      proxy_pass http://bifrost/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://bifrost/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /mcp/ {
      auth_basic off;
      proxy_pass http://auto_doc/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
    }

    location /health {
      auth_basic off;
      proxy_pass http://auto_doc/health;
    }

    location /info {
      auth_basic off;
      proxy_pass http://auto_doc/info;
    }
  }
}
